model:
  base_model: "./output/%{eval_model_stage}_%{category}_refactor/final_checkpoint"
data:
  test_file: ./data/Amazon/test/%{split_stem}.csv
  info_file: ./data/Amazon/info/%{split_stem}.txt
  category: "%{category}"
training:
  seed: 42
output:
  output_dir: "./results/final_result%{eval_result_suffix}_%{category}.json"
batch_size: 8
K: 0
num_beams: 50
max_new_tokens: 256
length_penalty: 0.0
temperature: 1.0
guidance_scale: null
runtime:
  launcher: parallel
  parallel: true
  cuda_visible_devices: "2,3,4,5"
  nproc_per_node: 4
