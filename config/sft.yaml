model:
  base_model: ../Qwen3-1.7B
  train_from_scratch: false
data:
  train_file: ./data/Amazon/train/%{split_stem}.csv
  eval_file: ./data/Amazon/valid/%{split_stem}.csv
  sid_index_path: ./data/Amazon/index/%{artifact_stem}.index.json
  item_meta_path: ./data/Amazon/index/%{artifact_stem}.item.json
  category: "%{category}"
training:
  batch_size: 1024
  micro_batch_size: 2
  cutoff_len: 512
  # Keep local default as the noalign baseline; override to true for align runs.
  enable_title_description_alignment: false
  description_task_probability: 0.5
  num_epochs: 10
  learning_rate: 0.0003
  seed: 42
  freeze_llm: false
  group_by_length: false
  warmup_steps: 20
  load_best_model_at_end: true
  early_stopping_patience: 3
  eval_step: 0.05
logging:
  wandb_project: OneRec
  wandb_run_name: "sft_%{category}"
  report_to: wandb
output:
  output_dir: "./output/sft_%{category}_refactor"
  save_total_limit: 2
runtime:
  launcher: torchrun
  cuda_visible_devices: "4,5,6,7"
  nproc_per_node: 4
